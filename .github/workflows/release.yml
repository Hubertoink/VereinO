name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'SemVer-Tag für das Release, z. B. v2.3.0'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package installer
        run: npm run package -- --publish never

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: VereinO ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, 'preview') }}
          files: |
            release/VereinO-Setup-*.exe
            release/VereinO-Setup-*.exe.blockmap
            release/latest.yml
            release/*.yml
            release/win-unpacked/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
