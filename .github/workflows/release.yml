name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'SemVer-Tag für das Release, z. B. v2.4.1'
        required: true

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact: release-windows
          - platform: linux
            os: ubuntu-latest
            artifact: release-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package app
        run: npm run package -- --publish never

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/latest*.yml
            release/*.exe
            release/*.exe.blockmap
            release/*.AppImage
            !release/*-unpacked/**
          if-no-files-found: error

  build-and-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: VereinO ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, 'preview') }}
          files: |
            release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
