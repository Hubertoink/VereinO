appId: org.verein.finanzplaner
productName: VereinO
buildVersion: 2.6.5
icon: build/Icon.ico
files:
  - dist/**
  - dist-electron/**
asar: true
asarUnpack:
  - '**/*.node'
directories:
  output: release
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/Icon.ico
artifactName: '${productName}-Setup-${version}-${arch}.${ext}'
mac:
  category: public.app-category.finance
linux:
  target: [AppImage]
  category: Finance
  icon: build/icon.png
  artifactName: '${productName}-${version}-${arch}.${ext}'
publish:
  provider: github
  owner: Hubertoink
  repo: VereinO
  releaseType: release
  channel: latest
  vPrefixedTagName: true
